<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">
    <title>Dashboard</title>
</head>
<body class="h-screen text-white flex flex-col font-sans relative overflow-hidden">

  <!-- Overall screen background (visible in gaps / behind cards) -->
  <div class="absolute inset-0 -z-10">
    <img
      src="/img/home-bg.png"
      alt="General farm background"
      class="h-full w-full object-cover"
    />
    <div class="absolute"></div>
  </div>

  <!-- Status bar – small screens only -->
  <div class="relative z-30 flex justify-between items-center px-6 pt-3 pb-1 text-sm bg-black/30 backdrop-blur-md md:hidden">
    <div>9:41</div>
    <div class="flex items-center gap-3">
      <svg class="size-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21q-3.75 0-6.375-2.625T3 12t2.625-6.375T12 3t6.375 2.625T21 12t-2.625 6.375T12 21m0-2q2.9 0 4.95-2.05T19 12t-2.05-4.95T12 5T7.05 7.05T5 12t2.05 4.95T12 19m-1-3l-4-4l1.4-1.4L11 12.2l5.6-5.6L18 8z"/></svg>
      <svg class="size-5 h-4" fill="currentColor" viewBox="0 0 20 16"><path d="M18 14h-2V4h2v10zM4 14H2V4h2v10zM16 2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      <div class="flex items-center gap-1">
        <div class="w-9 h-4 bg-white rounded-sm relative">
          <div class="absolute top-0.5 left-0.5 w-6 h-3 bg-black rounded-sm"></div>
        </div>
        <span class="text-xs font-medium">58%</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <main class="relative z-20 flex-1 px-5 pt-2 pb-28 overflow-y-auto">

    <!-- HEADER SECTION WITH ITS OWN BACKGROUND IMAGE -->
    <div class="relative mb-8 rounded-3xl overflow-hidden">
      <!-- Header-specific background image (different crop/blur) -->
      <div class="absolute inset-0 -z-10">
        <img
          src="/img/div.elementor-repeater-item-8f878b7.jpg"
          alt="Header background - blurred farm"
          class="h-full w-full object-cover "
        />
        <div class="absolute inset-0 "></div>
      </div>

      <!-- Content on top -->
      <div class="relative z-10 px-6 py-8 flex items-center justify-between">
        <div>
          <h1 class="text-3xl font-bold tracking-tight drop-shadow-lg">Hi, Amal</h1>
          <p class="text-xl text-gray-100/95 mt-1 drop-shadow-md">Dashboard</p>
        </div>
        <div class="size-16 rounded-full bg-white/15 backdrop-blur-md border-2 border-white/30 flex items-center justify-center shadow-lg">
         <img src="/img/Ellipse 11.jpg" class="rounded-full" alt="">
        </div>
      </div>
    </div>

    <!-- Search bar -->
    <div class="relative mb-8">
      <input
        type="text"
        placeholder="Search here..."
        class="w-full py-4 pl-6 pr-14 bg-yellow-400 rounded-2xl text-white placeholder-white focus:outline-none focus:border-yellow-400/70"
      />
      <svg class="absolute right-5 top-1/2 -translate-y-1/2 size-7 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>

    <!-- Feature cards -->
    <div class="grid grid-cols-2 gap-5">
      <div class="bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6 flex flex-col items-center text-center">
        <div class="size-20 bg-gray-800/50 rounded-xl mb-4 flex items-center justify-center">
        <img src="/img/Rectangle 4.jpg" alt="">
        </div>
        <span class="text-base font-medium">Articles</span>
      </div>

      <div class="bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6 flex flex-col items-center text-center">
        <div class="size-20 bg-gray-800/50 rounded-xl mb-4 flex items-center justify-center">
         <img src="/img/Rectangle 5.jpg" alt="">
        </div>
        <span class="text-base font-medium">Market</span>
      </div>

      <div class="bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6 flex flex-col items-center text-center">
        <div class="size-20 bg-gray-800/50 rounded-xl mb-4 flex items-center justify-center">
          <img src="/img/Rectangle 7 (3).jpg" alt="">
        </div>
        <span class="text-base font-medium">Guide</span>
      </div>

      <div class="bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6 flex flex-col items-center text-center">
        <div class="size-20 bg-gray-800/50 rounded-xl mb-4 flex items-center justify-center">
          <img src="/img/Rectangle 8.jpg" alt="">
        </div>
        <span class="text-base font-medium">Reports</span>
      </div>
    </div>
  </main>

  <!-- Bottom nav with separate background -->
  <nav class="relative z-20 h-24 flex items-center justify-around border-t border-white/10 overflow-hidden">
    <div class="absolute inset-0 -z-10">
      <img
        src="https://images.unsplash.com/photo-1592982537447-6f2a6a7a7e37?auto=format&fit=crop&q=80&w=800"
        alt="Nav background"
        class="h-full w-full object-cover scale-125"
      />
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/75 to-transparent backdrop-blur-xl"></div>
    </div>

    <button class="flex flex-col items-center text-green-400 relative z-10">
      <svg class="size-8 mb-1" fill="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      <span class="text-xs font-medium">Home</span>
    </button>

    <!-- other nav buttons same as before... -->
    <button class="flex flex-col items-center text-gray-300 relative z-10">
      <svg class="size-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
      <span class="text-xs font-medium">Menu</span>
    </button>

    <button class="flex flex-col items-center text-gray-300 relative z-10">
      <svg class="size-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      <span class="text-xs font-medium">Profile</span>
    </button>

    <button class="flex flex-col items-center text-gray-300 relative z-10">
      <svg class="size-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
      <span class="text-xs font-medium">Logout</span>
    </button>
  </nav>

</body>
  
</html>
