<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">
    <title>Welcome</title>
</head>

<body class="font-poppins m-0 p-0 overflow-hidden bg-black">

  <div class="relative w-screen h-screen overflow-hidden">

    <!-- Background farm image -->
    <div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
         style="background-image: url('./img/unsplash_b-0-LM0wzWM.jpg');">
    </div>

    <!-- Dark overlay -->
    <div class="absolute inset-0 "></div>

    <!-- Foreground -->
    <div class="relative z-10 flex flex-col h-full">

      <!-- STATUS BAR — mobile only -->
      <div class="flex sm:hidden items-center justify-between px-5 pt-3 pb-1 text-white">
        <span class="text-sm font-semibold">9:41</span>
        <div class="flex items-center gap-2">
          <!-- Signal bars -->
          <div class="flex items-end gap-[2px]" style="height:13px;">
            <div class="w-[3px] rounded-sm bg-white" style="height:3px;"></div>
            <div class="w-[3px] rounded-sm bg-white" style="height:6px;"></div>
            <div class="w-[3px] rounded-sm bg-white" style="height:9px;"></div>
            <div class="w-[3px] rounded-sm bg-white" style="height:12px;"></div>
          </div>
          <!-- WiFi -->
          <svg width="16" height="12" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="16" r="2" fill="white"/>
            <path d="M7.76 11.76a6 6 0 0 1 8.48 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M4.93 8.93a10 10 0 0 1 14.14 0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          </svg>
          <!-- Battery -->
          <div class="flex items-center gap-[2px]">
            <div class="border border-white rounded-[2px] p-[1.5px] flex items-center" style="width:22px; height:12px;">
              <div class="rounded-[1px] h-full bg-green-400" style="width:52%;"></div>
            </div>
            <div class="bg-white rounded-r-[1px]" style="width:3px; height:6px;"></div>
          </div>
        </div>
      </div>
      <!-- END STATUS BAR -->

      <!-- Logo -->
      <div class="flex items-center justify-center pt-6 sm:pt-10">
        <img src="./img/Ellipse 3.jpg" class="rounded-full" alt="">
      </div>

      <!-- Welcome heading -->
      <div class="text-center mt-4 sm:mt-6 px-6">
        <h1 class="text-agro-yellow font-extrabold italic text-4xl sm:text-5xl leading-tight">
          Welcome To<br/>AgroFarm
        </h1>
      </div>

      <!-- Choose Language -->
      <div class="flex items-center justify-center gap-3 mt-4 sm:mt-5">
        <span class="text-white text-sm sm:text-base font-medium" style="font-family: 'Courier New', monospace;">Choose Language</span>
        <span class="text-white text-base">&#9776;</span>
        <span class="text-white text-sm sm:text-base font-medium">English</span>
        <span class="text-white text-sm sm:text-base font-medium underline underline-offset-2">Sinhala</span>
      </div>

      <!-- Farmer & Dealer circles -->
      <div class="flex items-center justify-center gap-10 sm:gap-16 mt-6 sm:mt-8 px-8">

        <!-- Farmer -->
        <div class="flex flex-col items-center gap-3">
          <div class="rounded-full  flex items-center justify-center w-28 h-28 sm:w-32 sm:h-32">
           <img src="./img/Ellipse 11.jpg" class="rounded-full" alt="">
          </div>
          <button class="bg-red-200 text-black font-bold text-base sm:text-lg px-10 sm:px-12 py-3 rounded-full shadow-md w-36 sm:w-40">
            Farmer
          </button>
        </div>

        <!-- Dealer -->
        <div class="flex flex-col items-center gap-3">
          <div class="rounded-full  flex items-center justify-center w-28 h-28 sm:w-32 sm:h-32">
            <img src="./img/Ellipse 12.jpg" class="rounded-full" alt="">
          </div>
          <button class="bg-red-200 text-black font-bold text-base sm:text-lg px-10 sm:px-12 py-3 rounded-full shadow-md w-36 sm:w-40">
            Dealer
          </button>
        </div>

      </div>

      <!-- Spacer -->
      <div class="flex-1"></div>

      <!-- Bottom section -->
      <div class="flex flex-col items-center gap-3 pb-10 sm:pb-14 px-8 text-center">
        <p class="text-white font-semibold text-sm sm:text-base">
          We're popular in agriculture<br/>market globally
        </p>
        <button class="bg-yellow-300 text-black font-semibold text-sm sm:text-base px-10 py-3 rounded-full shadow-md">
          Discover More
        </button>
      </div>

    </div>
  </div>

</body>
</html>
