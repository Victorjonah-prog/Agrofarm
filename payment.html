<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">
    <title>Payment</title>
</head>
<body class="h-screen bg-green-300 text-gray-900 flex flex-col font-sans">

  <!-- Status bar – visible only on small screens -->
  <div class="relative z-30 flex justify-between items-center px-5 pt-2.5 pb-1.5 text-sm bg-black/8 backdrop-blur-md md:hidden text-gray-800">
    <div>9:41</div>
    <div class="flex items-center gap-2.5">
      <svg class="size-4" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21q-3.75 0-6.375-2.625T3 12t2.625-6.375T12 3t6.375 2.625T21 12t-2.625 6.375T12 21m0-2q2.9 0 4.95-2.05T19 12t-2.05-4.95T12 5T7.05 7.05T5 12t2.05 4.95T12 19m-1-3l-4-4l1.4-1.4L11 12.2l5.6-5.6L18 8z"/>
      </svg>
      <svg class="size-5 h-4" fill="currentColor" viewBox="0 0 20 16">
        <path d="M18 14h-2V4h2v10zM4 14H2V4h2v10zM16 2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <div class="flex items-center gap-1">
        <div class="w-9 h-4 bg-gray-800 rounded-sm relative">
          <div class="absolute top-0.5 left-0.5 w-6 h-3 bg-white rounded-sm"></div>
        </div>
        <span class="text-xs font-medium">58%</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto pb-28 px-5 pt-4">

    <!-- Header with white background and border (exactly as in screenshot) -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-8 flex items-center gap-4">
      <button class="text-3xl font-bold text-gray-800">&larr;</button>
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Payment</h1>
    </div>

    <!-- Order summary -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-6 space-y-4">
      <div class="grid grid-cols-[auto,1fr] gap-x-6 gap-y-3 text-sm">
        <div class="text-gray-600 font-medium">Price Amount</div>
        <div class="text-right font-semibold text-gray-900">Rs.1500/=</div>

        <div class="text-gray-600 font-medium">Category</div>
        <div class="text-right text-gray-900">NPK -15</div>

        <div class="text-gray-600 font-medium">Delivery</div>
        <div class="text-right text-gray-900">3 - 4 Day</div>

        <div class="text-gray-600 font-medium">Seller</div>
        <div class="text-right text-gray-900">Saman</div>
      </div>
    </div>

    <!-- Card details -->
    <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-5 mb-6">
      <div class="flex items-center justify-between mb-4">
        <div class="text-base font-medium text-gray-900">Enter Card Details</div>
        <div class="flex items-center gap-3">
          <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" alt="Visa" class="h-6 opacity-90">
          <img src="https://upload.wikimedia.org/wikipedia/commons/b/b7/MasterCard_Logo.svg" alt="Mastercard" class="h-6 opacity-90">
        </div>
      </div>

      <div class="bg-gray-50 border border-gray-300 rounded-xl p-5 text-center font-semibold text-lg text-gray-900">
        Total amount : 1500/=
      </div>
    </div>

    <!-- Contact seller -->
    <button class="w-full bg-white rounded-xl border border-gray-200 py-4 px-5 mb-6 flex items-center justify-between text-left shadow-sm">
      <div>
        <div class="font-medium text-gray-900 mb-1">Contact Seller</div>
        <div class="text-sm text-gray-600">Message or call the seller</div>
      </div>
      <svg class="size-7 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
      </svg>
    </button>

    <!-- Free shipping -->
    <div class="bg-green-50 border border-green-200 rounded-xl p-4 mb-8 flex items-center gap-4 shadow-sm">
      <div class="size-12 bg-green-100 rounded-full flex items-center justify-center text-2xl">🚚</div>
      <div>
        <div class="font-medium text-gray-900">Free Shipping</div>
        <div class="text-sm text-green-700">On All Orders Over Rs.5000.00</div>
      </div>
    </div>

    <!-- Pay Now -->
    <button class="w-full py-5 bg-orange-500 text-white font-bold text-xl rounded-2xl shadow-md">
      Pay Now
    </button>

  </main>

  <!-- Bottom navigation -->
  <nav class="relative z-30 h-20 bg-white border-t border-gray-200 flex items-center justify-around shadow-[0_-1px_3px_rgba(0,0,0,0.08)]">
    <button class="flex flex-col items-center text-green-600">
      <svg class="size-7 mb-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-xs font-medium">Home</span>
    </button>

    <button class="flex flex-col items-center text-gray-600">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
      </svg>
      <span class="text-xs font-medium">Menu</span>
    </button>

    <button class="flex flex-col items-center text-gray-600">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-xs font-medium">Profile</span>
    </button>

    <button class="flex flex-col items-center text-gray-600">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      <span class="text-xs font-medium">Logout</span>
    </button>
  </nav>

</body>
</html>
