<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">
    <title>Success</title>
</head>
<body class="h-screen bg-gray-100 text-gray-900 flex flex-col font-sans">

  <!-- Status bar – only visible on small screens -->
  <div class="relative z-30 flex justify-between items-center px-5 pt-2.5 pb-1.5 text-sm bg-black/10 backdrop-blur-md md:hidden text-gray-800">
    <div>9:41</div>
    <div class="flex items-center gap-2.5">
      <svg class="size-4" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21q-3.75 0-6.375-2.625T3 12t2.625-6.375T12 3t6.375 2.625T21 12t-2.625 6.375T12 21m0-2q2.9 0 4.95-2.05T19 12t-2.05-4.95T12 5T7.05 7.05T5 12t2.05 4.95T12 19m-1-3l-4-4l1.4-1.4L11 12.2l5.6-5.6L18 8z"/>
      </svg>
      <svg class="size-5 h-4" fill="currentColor" viewBox="0 0 20 16">
        <path d="M18 14h-2V4h2v10zM4 14H2V4h2v10zM16 2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <div class="flex items-center gap-1">
        <div class="w-9 h-4 bg-gray-800 rounded-sm relative">
          <div class="absolute top-0.5 left-0.5 w-6 h-3 bg-white rounded-sm"></div>
        </div>
        <span class="text-xs font-medium">58%</span>
      </div>
    </div>
  </div>

  <!-- Main content – centered success screen -->
  <main class="flex-1 flex flex-col items-center justify-center px-5 pt-4 pb-20">

    <!-- Back link (white rounded pill) -->
    <div class="bg-white rounded-full border border-gray-200 shadow-sm px-6 py-3 mb-16 w-full max-w-md flex items-center gap-3">
      <button class="text-2xl font-bold text-gray-700">&larr;</button>
      <span class="text-base font-medium text-gray-800">Back to Marketplace</span>
    </div>

    <!-- Big green success circle -->
    <div class="w-52 h-52 md:w-64 md:h-64 rounded-full bg-green-500 flex items-center justify-center shadow-lg mb-10">
      <svg class="w-40 h-40 md:w-52 md:h-52 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <!-- Success message (black rounded rectangle) -->
    <div class="bg-black text-white text-center font-bold text-xl md:text-2xl py-5 px-10 rounded-2xl shadow-md w-full max-w-md">
      Payment Success !
    </div>

  </main>

  <!-- Bottom navigation bar -->
  <nav class="relative z-30 h-20 bg-white border-t border-gray-200 flex items-center justify-around shadow-[0_-1px_3px_rgba(0,0,0,0.1)]">
    <button class="flex flex-col items-center text-green-600">
      <svg class="size-7 mb-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-xs font-medium">Home</span>
    </button>

    <button class="flex flex-col items-center text-gray-600">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
      </svg>
      <span class="text-xs font-medium">Menu</span>
    </button>

    <button class="flex flex-col items-center text-gray-600">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-xs font-medium">Profile</span>
    </button>

    <button class="flex flex-col items-center text-gray-600">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      <span class="text-xs font-medium">Logout</span>
    </button>
  </nav>

</body>
</html>
