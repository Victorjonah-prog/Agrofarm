<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">
    <title>Document</title>
</head>
<body class="bg-black  flex items-center justify-center  font-poppins">

  <!-- Phone wrapper -->
  <div class="relative w-full overflow-hidden" style="height: 100svh;">

    <!-- Background image layer -->
    <div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
         style="background-image: url('./img/unsplash_b-0-LM0wzWM.jpg');">
    </div>

    <!-- Dark gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-b from-slate-800/75 via-slate-900/25 to-slate-950/10"></div>

    <!-- Foreground content -->
    <div class="relative z-10 flex flex-col h-full">

      <!-- ===== STATUS BAR — visible on mobile only (hidden sm+) ===== -->
      <div class="flex sm:hidden items-center justify-between px-5 pt-3 pb-1 text-white">

        <!-- Time -->
        <span class="text-sm font-semibold">9:41</span>

        <!-- Right: signal + wifi + battery -->
        <div class="flex items-center gap-2">

          <!-- Network signal bars -->
          <div class="flex items-end gap-[2px]" style="height:13px;">
            <div class="w-[3px] rounded-sm bg-white" style="height:3px;"></div>
            <div class="w-[3px] rounded-sm bg-white" style="height:6px;"></div>
            <div class="w-[3px] rounded-sm bg-white" style="height:9px;"></div>
            <div class="w-[3px] rounded-sm bg-white" style="height:12px;"></div>
          </div>

          <!-- WiFi icon -->
          <svg width="16" height="12" viewBox="0 0 24 18" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="16" r="2" fill="white"/>
            <path d="M7.76 11.76a6 6 0 0 1 8.48 0" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
            <path d="M4.93 8.93a10 10 0 0 1 14.14 0" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
          </svg>

          <!-- Battery icon -->
          <div class="flex items-center gap-[2px]">
            <div class="border border-white rounded-[2px] p-[1.5px] flex items-center" style="width:22px; height:12px;">
              <div class="rounded-[1px] h-full bg-green-400" style="width:50%;"></div>
            </div>
            <div class="bg-white rounded-r-[1px]" style="width:3px; height:6px;"></div>
          </div>

        </div>
      </div>
      <!-- ===== END STATUS BAR ===== -->

      <!-- Main content: centered vertically -->
      <div class="flex-1 flex flex-col items-center justify-center gap-10 px-8 text-center">

        <!-- Headline text -->
        <div class="text-white">
          <h1 class="text-4xl font-bold leading-snug">Grow smarter with</h1>
          <h1 class="text-4xl font-bold leading-snug">
            Our
            <span class="text-agro-yellow relative inline-block">
              AgroFarm
              <!-- Yellow swoosh underline -->
              <svg class="absolute w-full left-0" style="bottom: -6px;" viewBox="0 0 120 12" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 9 Q60 2 116 9" stroke="#F5C842" stroke-width="3" stroke-linecap="round" fill="none"/>
              </svg>
            </span>
          </h1>
        </div>

        <!-- Circular logo -->
        <div class="flex flex-col items-center justify-center">

        <a href="/index2.html">
          <img src="./img/Ellipse 3.jpg" class="rounded-full" alt="">
        </a>
        </div>

      </div>

      <!-- Bottom app label -->
      <div class="text-center text-white text-2xl opacity-70 pb-8">AgroFarm</div>

    </div>
  </div>

</body>
</html>
