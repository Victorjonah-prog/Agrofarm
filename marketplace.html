<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/output.css">
    <title>Document</title>
</head>
<body class="h-screen text-white flex flex-col font-sans relative overflow-hidden bg-gray-950">

  <!-- 1. Full screen background (faded, visible behind everything) -->
  <div class="absolute inset-0 -z-10">
    <img
      src="/img/home-bg.png"
      alt="Background farm field"
      class="h-full w-full object-cover "
    />
    <div class="absolute inset-0 b"></div>
  </div>

  <!-- 2. Mobile status bar – only visible on small screens -->
  <div class="relative z-30 flex justify-between items-center px-5 pt-2.5 pb-1.5 text-sm bg-black/40 backdrop-blur-md md:hidden">
    <div>9:41</div>
    <div class="flex items-center gap-2.5">
      <!-- signal -->
      <svg class="size-4" fill="currentColor" viewBox="0 0 24 24">
        <path d="M12 21q-3.75 0-6.375-2.625T3 12t2.625-6.375T12 3t6.375 2.625T21 12t-2.625 6.375T12 21m0-2q2.9 0 4.95-2.05T19 12t-2.05-4.95T12 5T7.05 7.05T5 12t2.05 4.95T12 19m-1-3l-4-4l1.4-1.4L11 12.2l5.6-5.6L18 8z"/>
      </svg>
      <!-- wifi -->
      <svg class="size-5 h-4" fill="currentColor" viewBox="0 0 20 16">
        <path d="M18 14h-2V4h2v10zM4 14H2V4h2v10zM16 2H4c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
      </svg>
      <!-- battery -->
      <div class="flex items-center gap-1">
        <div class="w-9 h-4 bg-white rounded-sm relative">
          <div class="absolute top-0.5 left-0.5 w-6 h-3 bg-black rounded-sm"></div>
        </div>
        <span class="text-xs font-medium">58%</span>
      </div>
    </div>
  </div>

  <!-- 3. Scrollable main content -->
  <main class="relative z-20 flex-1 overflow-y-auto pb-28">

    <!-- Header with own background image -->
    <div class="relative h-48 md:h-56 overflow-hidden">
      <img
        src="/img/section 03.jpg"
        alt="Marketplace header - vegetables & crops"
        class="absolute inset-0 w-full h-full object-cover brightness-90 scale-105"
      />
      <!-- <div class="absolute inset-0 bg-gradient-to-b from-black/30 via-black/50 to-black/80"></div>

      <div class="relative z-10 px-5 pt-10 md:pt-14 flex items-center gap-4">
        <button class="text-3xl font-bold text-white">&larr;</button>
        <h1 class="text-2xl md:text-3xl font-bold drop-shadow-lg">Marketplace</h1>
      </div> -->
    </div>

    <!-- Content area -->
    <div class="px-5 pt-6 pb-10">

      <!-- Section title + tabs -->
      <div class="mb-6">
        <h2 class="text-xl md:text-2xl font-semibold mb-4">Featured Products</h2>
        <div class="flex gap-3 overflow-x-auto pb-2">
          <button class="px-6 py-2 bg-green-600 text-white rounded-full text-sm font-medium whitespace-nowrap">All</button>
          <button class="px-6 py-2 bg-white/10 backdrop-blur-sm border border-white/20 rounded-full text-sm font-medium whitespace-nowrap">Organic</button>
          <button class="px-6 py-2 bg-white/10 backdrop-blur-sm border border-white/20 rounded-full text-sm font-medium whitespace-nowrap">NPK</button>
        </div>
      </div>

      <!-- Product cards -->
      <div class="space-y-8">

        <!-- Product 1 -->
        <div class="bg-white  rounded-2xl border border-white overflow-hidden">
          <div class="h-48 bg-white flex items-center justify-center">
            <!-- Placeholder for product image -->
             <img src="/img/Rectangle 1063.jpg" alt="">
            
          </div>
          <div class="p-5">
            <div class="text-xs uppercase tracking-wide text-green-400 mb-1">ORGANIC</div>
            <h3 class="text-lg font-semibold mb-1">NPK -0:0:50</h3>
            <p class="text-green-300 mb-3">Rs.2400/=</p>
            <button class="w-full py-3 bg-yellow-500/90 text-black font-medium rounded-full flex items-center justify-center gap-2 border border-yellow-400/40">
              <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
              </svg>
              SHOP NOW
            </button>
          </div>
        </div>

        <!-- Product 2 -->
        <div class="bg-white backdrop-blur-lg rounded-2xl border border-white overflow-hidden">
          <div class="h-48 bg-white flex items-center justify-center">
            <img src="/img/Rectangle 1063.jpg" alt="">
          </div>
          <div class="p-5">
            <div class="text-xs uppercase tracking-wide text-green-400 mb-1">ORGANIC</div>
            <h3 class="text-lg font-semibold mb-1">NPK -15:15:15</h3>
            <p class="text-green-300 mb-3">Rs.1500/=</p>
            <button class="w-full py-3 bg-yellow-500/90 text-black font-medium rounded-full flex items-center justify-center gap-2 border border-yellow-400/40">
              <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
              </svg>
              SHOP NOW
            </button>
          </div>
        </div>

        <!-- Product 3 -->
        <div class="bg-white  rounded-2xl border border-white overflow-hidden">
          <div class="h-48 bg-white flex items-center justify-center">
            <img src="/img/Rectangle 1063.jpg" alt="">
          </div>
          <div class="p-5">
            <div class="text-xs uppercase tracking-wide text-green-400 mb-1">ORGANIC</div>
            <h3 class="text-lg font-semibold mb-1">NPK -19:19:19</h3>
            <p class="text-green-300 mb-3">Rs.800/=</p>
            <button class="w-full py-3 bg-yellow-500/90 text-black font-medium rounded-full flex items-center justify-center gap-2 border border-yellow-400/40">
              <svg class="size-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
              </svg>
              SHOP NOW
            </button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- 4. Bottom navigation with its own background -->
  <nav class="relative z-30 h-20 flex items-center justify-around border-t border-white/10 overflow-hidden">
    <div class="absolute inset-0 -z-10">
      <img
        src="https://images.unsplash.com/photo-1597843786411-a7fa8ed2f1c4?auto=format&fit=crop&q=80&w=800"
        alt="Nav background - blurred crops"
        class="h-full w-full object-cover scale-110 brightness-75"
      />
      <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/70 to-transparent backdrop-blur-xl"></div>
    </div>

    <button class="flex flex-col items-center text-green-400 relative z-10">
      <svg class="size-7 mb-1" fill="currentColor" viewBox="0 0 24 24">
        <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="text-xs">Home</span>
    </button>

    <button class="flex flex-col items-center text-gray-300 relative z-10">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
      </svg>
      <span class="text-xs">Menu</span>
    </button>

    <button class="flex flex-col items-center text-gray-300 relative z-10">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      <span class="text-xs">Profile</span>
    </button>

    <button class="flex flex-col items-center text-gray-300 relative z-10">
      <svg class="size-7 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
      <span class="text-xs">Logout</span>
    </button>
  </nav>

</body>
</html>
